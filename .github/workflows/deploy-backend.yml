name: 自动构建并部署到阿里云 (后端-API)

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**' # 💡 只有后端代码变动才触发
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: 检出源码
        uses: actions/checkout@v4

      - name: 部署代码到服务器
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: 'backend/*'
          # 💡 假设你服务器后端目录是 /var/www/momocha-api
          target: '/var/www/momocha-api'
          strip_components: 1
          overwrite: true
          # 💡 关键：排除掉数据库文件，防止部署时把线上数据库覆盖成空的
          rm: false 
          exclude: 'backend/data/momocha.db,backend/node_modules'

      - name: 执行远程命令 (安装与重启)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/momocha-api
            # 1. 安装依赖 (生产环境)
            npm install --production
            # 2. 使用 PM2 启动或重启 (如果你没装 pm2，需要 sudo npm install -g pm2)
            # --max-memory-restart 限制内存在 200M 以内，适合 1G 内存服务器
            pm2 reload index.js --name "momocha-api" || pm2 start index.js --name "momocha-api" --max-memory-restart 200M