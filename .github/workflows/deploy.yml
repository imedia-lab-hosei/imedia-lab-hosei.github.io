name: 自动构建并部署到阿里云

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 检出源码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          # 匹配你的本地版本 24.13.0
          node-version: '24.13.0'
          cache: 'npm'

      - name: 安装依赖与打包
        run: |
          npm install
          npm run build

      - name: 部署到阿里云
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          # 重要：请确保 vite.config.ts 里的 outDir 是 'dist'
          source: 'dist/*'
          target: '/var/www/yzdWebsite'
          strip_components: 1
          overwrite: true

      - name: 重载 Nginx
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: sudo systemctl reload nginx
